[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".skill-evals", "**/evals/fixtures/**"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.11"
files = [
    "scripts",
    "tests",
    "skills/cloud-diagram/scripts",
    "skills/drawio-shapes/scripts",
]
exclude = "(^|/)evals/fixtures/"
check_untyped_defs = true
no_implicit_optional = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.bandit]
exclude_dirs = [".skill-evals", "evals/fixtures", "tests"]
