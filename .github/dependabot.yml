version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Australia/Sydney
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Australia/Sydney
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      quality-tooling:
        patterns: ["*"]
    commit-message:
      prefix: build
